document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

kground:var(--navy)}\n    .nav-submenu{position:absolute;top:calc(100% + 8px);left:0;background:white;border:1px solid var(--border);border-radius:6px;padding:0.5rem 0;min-width:240px;box-shadow:0 8px 32px rgba(15,32,68,0.1);opacity:0;visibility:hidden;transform:translateY(4px);transition:all 0.18s;list-style:none}\n    .nav-links > li:hover .nav-submenu{opacity:1;visibility:visible;transform:translateY(0)}\n    .nav-submenu a{display:block;padding:0.45rem 1.1rem;font-size:0.8rem;opacity:0.75}\n    .nav-submenu a:hover{background:var(--offwhite);opacity:1}\n\n    /* ── Hero ── */\n    .home-hero{min-height:100vh;background:linear-gradient(150deg,var(--navy-deep) 0%,var(--navy) 55%,var(--navy-mid) 100%);display:grid;grid-template-columns:1fr 600px;align-items:stretch;position:relative;overflow:hidden}\n    .home-hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:36px 36px;pointer-events:none}\n    /* Subtle gold line accent */\n    .home-hero::after{content:'';position:absolute;left:0;bottom:0;width:100%;height:3px;background:linear-gradient(to right,var(--gold) 0%,transparent 60%)}\n\n    .hero-content{padding:calc(68px + 5rem) 4rem 5rem 4rem;position:relative;z-index:2;display:flex;flex-direction:column;justify-content:center}\n    .hero-eyebrow{font-size:0.7rem;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:2rem;display:flex;align-items:center;gap:0.75rem}\n    .hero-eyebrow::before{content:'';display:block;width:24px;height:1px;background:var(--gold)}\n    .hero-content h1{font-family:'DM Serif Display',serif;font-size:clamp(3rem,4.5vw,5.5rem);color:white;line-height:1.05;margin-bottom:1.6rem;letter-spacing:-0.01em}\n    .hero-content h1 em{font-style:italic;color:var(--gold)}\n    .hero-sub{font-size:1rem;line-height:1.85;color:rgba(255,255,255,0.58);font-weight:300;margin-bottom:3rem;max-width:500px}\n    .hero-actions{display:flex;gap:1rem;flex-wrap:wrap;align-items:center}\n    .btn-primary{display:inline-block;background:white;color:var(--navy);padding:0.95rem 2.2rem;font-size:0.84rem;font-weight:500;text-decoration:none;border-radius:3px;transition:all 0.2s;letter-spacing:0.02em}\n    .btn-primary:hover{background:var(--gold);color:var(--navy-deep)}\n    .btn-ghost{display:inline-block;color:rgba(255,255,255,0.6);font-size:0.84rem;font-weight:400;text-decoration:none;padding:0.95rem 0;border-bottom:1px solid rgba(255,255,255,0.2);transition:all 0.2s}\n    .btn-ghost:hover{color:white;border-bottom-color:rgba(255,255,255,0.5)}\n\n    /* Credentials strip */\n    .hero-credentials{display:flex;gap:2rem;margin-top:4rem;padding-top:2.5rem;border-top:1px solid rgba(255,255,255,0.08)}\n    .cred-item{display:flex;flex-direction:column;gap:0.2rem}\n    .cred-label{font-size:0.65rem;color:rgba(255,255,255,0.35);letter-spacing:0.12em;text-transform:uppercase}\n    .cred-value{font-size:0.82rem;color:rgba(255,255,255,0.7);font-weight:300}\n\n    /* Photo panel */\n    .hero-photo{position:relative;overflow:hidden;display:flex;align-items:flex-end}\n    .hero-photo img{width:100%;height:100%;object-fit:cover;object-position:95% 5%;display:block;opacity:0.95}\n    .hero-photo::before{content:'';position:absolute;inset:0;background:linear-gradient(to right,var(--navy-deep) 0%,transparent 45%),linear-gradient(to top,var(--navy-deep) 0%,transparent 12%);z-index:1}\n\n    /* ── Section basics ── */\n    .section{padding:5.5rem 4rem}\n    .section-inner{max-width:1080px;margin:0 auto}\n    .section-label{font-size:0.68rem;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--blue-accent);margin-bottom:0.8rem;display:flex;align-items:center;gap:0.6rem}\n    .section-label::before{content:'';display:block;width:16px;height:1px;background:var(--blue-accent)}\n    .section-title{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,2.5vw,2.6rem);color:var(--navy);line-height:1.12;margin-bottom:0.8rem}\n    .section-intro{font-size:0.9rem;line-height:1.9;color:var(--muted);font-weight:300;max-width:580px;margin-bottom:3rem}\n\n    /* ── Schwerpunkte ── */\n    .schwerpunkte{background:var(--offwhite)}\n    .schwerpunkte-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem}\n    .schwerpunkt-card{background:white;border:1px solid var(--border);border-radius:8px;padding:2.2rem;transition:all 0.25s;display:flex;flex-direction:column;position:relative;overflow:hidden}\n    .schwerpunkt-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:transparent;transition:background 0.25s}\n    .schwerpunkt-card:hover{border-color:transparent;box-shadow:0 12px 40px rgba(15,32,68,0.1)}\n    .schwerpunkt-card:hover::before{background:var(--gold)}\n    .schwerpunkt-num{font-size:0.68rem;font-weight:500;letter-spacing:0.18em;color:var(--gold);margin-bottom:1rem;text-transform:uppercase}\n    .schwerpunkt-card h3{font-family:'DM Serif Display',serif;font-size:1.25rem;color:var(--navy);margin-bottom:0.8rem;line-height:1.2}\n    .schwerpunkt-card p{font-size:0.84rem;line-height:1.8;color:var(--muted);font-weight:300;margin-bottom:1.6rem;flex:1}\n    .schwerpunkt-links{list-style:none;display:flex;flex-direction:column;gap:0.35rem;border-top:1px solid var(--border);padding-top:1.2rem;margin-top:auto}\n    .schwerpunkt-links a{font-size:0.8rem;color:var(--navy);text-decoration:none;padding:0.15rem 0;opacity:0.65;transition:opacity 0.15s;display:flex;align-items:center;gap:0.4rem}\n    .schwerpunkt-links a::before{content:'→';opacity:0.4;font-size:0.75rem}\n    .schwerpunkt-links a:hover{opacity:1}\n\n    /* ── Grundsätze (navy bg) ── */\n    .grundsaetze{background:var(--navy);padding:5.5rem 4rem}\n    .grundsaetze .section-label{color:var(--gold)}\n    .grundsaetze .section-label::before{background:var(--gold)}\n    .grundsaetze .section-title{color:white}\n    .grundsaetze-wrap{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:start}\n    .grundsaetze-text p{font-size:0.92rem;line-height:1.9;color:rgba(255,255,255,0.55);font-weight:300;margin-bottom:1rem}\n    .grundsaetze-text a{font-size:0.84rem;color:var(--gold);font-weight:400;text-decoration:none;border-bottom:1px solid rgba(201,168,76,0.3);transition:border-color 0.2s;padding-bottom:1px}\n    .grundsaetze-text a:hover{border-bottom-color:var(--gold)}\n    .grundsaetze-list{list-style:none;display:flex;flex-direction:column;gap:0}\n    .grundsatz-item{display:flex;gap:1.5rem;align-items:flex-start;padding:1.6rem 0;border-bottom:1px solid rgba(255,255,255,0.07)}\n    .grundsatz-item:first-child{padding-top:0}\n    .grundsatz-item:last-child{border-bottom:none}\n    .grundsatz-num{font-family:'DM Serif Display',serif;font-size:2rem;color:rgba(255,255,255,0.08);flex-shrink:0;width:40px;line-height:1;margin-top:-0.2rem}\n    .grundsatz-body h4{font-family:'DM Serif Display',serif;font-size:1rem;color:white;margin-bottom:0.3rem}\n    .grundsatz-body p{font-size:0.82rem;line-height:1.7;color:rgba(255,255,255,0.45);font-weight:300}\n\n    /* ── Situationen ── */\n    .situationen{background:white}\n    .situationen-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden}\n    .situation-card{background:white;padding:2.2rem;transition:background 0.2s;text-decoration:none;display:block}\n    .situation-card:hover{background:var(--offwhite)}\n    .situation-tag{font-size:0.66rem;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:0.6rem;display:block}\n    .situation-card h4{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--navy);margin-bottom:0.4rem;line-height:1.25}\n    .situation-context{font-size:0.75rem;color:var(--muted);font-style:italic;margin-bottom:0.8rem;display:block;font-weight:300}\n    .situation-card p{font-size:0.83rem;line-height:1.75;color:var(--muted);font-weight:300;margin-bottom:1rem}\n    .situation-link{font-size:0.78rem;color:var(--navy);font-weight:500;opacity:0.5}\n\n    /* ── Timeline Banner ── */\n    .timeline-banner{background:var(--navy-deep);padding:4rem 4rem;border-top:1px solid rgba(255,255,255,0.05)}\n    .timeline-inner{max-width:1080px;margin:0 auto}\n    .timeline-eyebrow{font-size:0.68rem;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;display:flex;align-items:center;gap:0.6rem}\n    .timeline-eyebrow::before{content:'';display:block;width:16px;height:1px;background:var(--gold)}\n    .timeline-banner > .timeline-inner > p{font-size:0.88rem;line-height:1.9;color:rgba(255,255,255,0.45);font-weight:300;max-width:640px;margin-bottom:3rem}\n    .timeline-track{display:grid;grid-template-columns:repeat(3,1fr);gap:0;position:relative;border-top:1px solid rgba(255,255,255,0.1);padding-top:2rem}\n    .timeline-node{position:relative;padding-right:2rem}\n    .timeline-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.2);margin-bottom:1rem;position:relative;top:-2.65rem}\n    .timeline-node.active .timeline-dot{background:var(--gold);border-color:var(--gold)}\n    .timeline-date{font-size:0.7rem;font-weight:500;color:rgba(255,255,255,0.35);margin-bottom:0.3rem;letter-spacing:0.06em}\n    .timeline-node.active .timeline-date{color:var(--gold)}\n    .timeline-place{font-size:0.88rem;color:rgba(255,255,255,0.5);line-height:1.5;font-weight:300}\n    .timeline-node.active .timeline-place{color:white}\n\n    /* ── Technik ── */\n    .technik{background:var(--offwhite)}\n    .technik-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden}\n    .technik-item{background:white;padding:1.8rem;transition:background 0.2s}\n    .technik-item:hover{background:var(--offwhite)}\n    .technik-num{font-size:0.65rem;color:var(--gold);font-weight:500;letter-spacing:0.12em;margin-bottom:0.8rem}\n    .technik-item h4{font-family:'DM Serif Display',serif;font-size:0.95rem;color:var(--navy);margin-bottom:0.4rem;line-height:1.3}\n    .technik-item p{font-size:0.8rem;line-height:1.7;color:var(--muted);font-weight:300}\n\n    /* ── Zweitmeinung CTA ── */\n    .zweitmeinung-cta{background:var(--navy);padding:5rem 4rem}\n    .zweitmeinung-inner{max-width:1080px;margin:0 auto;display:grid;grid-template-columns:3fr 1fr;gap:4rem;align-items:center}\n    .zweitmeinung-inner h2{font-family:'DM Serif Display',serif;font-size:clamp(1.6rem,2.2vw,2.4rem);color:white;line-height:1.15;margin-bottom:1rem}\n    .zweitmeinung-inner p{font-size:0.88rem;line-height:1.9;color:rgba(255,255,255,0.5);font-weight:300;margin-bottom:2rem}\n    .btn-gold{display:inline-block;background:var(--gold);color:var(--navy-deep);padding:1rem 2.2rem;font-size:0.84rem;font-weight:500;text-decoration:none;border-radius:3px;transition:background 0.2s;letter-spacing:0.02em}\n    .btn-gold:hover{background:#e8c97a}\n\n    /* ── Final CTA ── */\n    .final-cta{background:var(--offwhite);text-align:center;padding:6rem 4rem;border-top:1px solid var(--border)}\n    .final-cta-inner{max-width:520px;margin:0 auto}\n    .final-cta h2{font-family:'DM Serif Display',serif;font-size:clamp(1.6rem,2.2vw,2.4rem);color:var(--navy);margin-bottom:0.75rem;line-height:1.2}\n    .final-cta p{color:var(--muted);font-size:0.9rem;font-weight:300;line-height:1.75;margin-bottom:2rem}\n    .btn-navy{display:inline-block;background:var(--navy);color:white;padding:1rem 2.4rem;font-size:0.84rem;font-weight:500;text-decoration:none;border-radius:3px;transition:background 0.2s;letter-spacing:0.02em}\n    .btn-navy:hover{background:var(--navy-mid)}\n\n    /* ── Footer ── */\n    footer{background:var(--navy-deep);padding:2rem 4rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}\n    footer p{font-size:0.73rem;color:rgba(255,255,255,0.25);margin:0}\n    .footer-links{display:flex;gap:1.5rem;list-style:none}\n    .footer-links a{font-size:0.73rem;color:rgba(255,255,255,0.25);text-decoration:none;transition:color 0.2s}\n    .footer-links a:hover{color:var(--gold)}\n\n    /* ── Doctolib ── */\n    .doctolib-widget{position:fixed;bottom:2rem;right:2rem;z-index:998}\n    .doctolib-widget a{display:flex;align-items:center;gap:0.6rem;background:var(--navy);color:#fff;text-decoration:none;padding:0.75rem 1.2rem;border-radius:4px;box-shadow:0 4px 20px rgba(15,32,68,0.35);transition:background 0.2s}\n    .doctolib-widget a:hover{background:var(--navy-mid)}\n    .doctolib-widget .btn-label{font-size:0.78rem;font-weight:500;letter-spacing:0.04em}\n    .doctolib-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0}\n\n    /* ── Responsive ── */\n\n    /* Tablet landscape: 961–1200px */\n    @media(max-width:1200px) and (min-width:961px){\n      .home-hero{grid-template-columns:1fr 480px}\n      nav{padding:0 2rem}\n      .hero-content{padding:calc(68px + 4rem) 2.5rem 4rem}\n      .section,.grundsaetze,.technik,.zweitmeinung-cta,.final-cta,.timeline-banner{padding:4.5rem 2.5rem}\n    }\n\n    /* Tablet portrait: 601–960px — Foto als Hintergrund */\n    @media(max-width:960px){\n      nav{padding:0 1.5rem}\n      .nav-links{display:none}\n      .nav-links.open{display:flex;flex-direction:column;position:fixed;top:68px;left:0;right:0;background:rgba(255,255,255,0.98);padding:1.5rem 2rem;gap:0.75rem;box-shadow:0 4px 20px rgba(0,0,0,0.1);border-top:1px solid var(--border);z-index:999;max-height:calc(100vh - 68px);overflow-y:auto}\n      .nav-links.open .nav-submenu{position:static;opacity:1;visibility:visible;transform:none;box-shadow:none;border:none;padding:0.4rem 0 0.4rem 1rem;background:transparent}\n      .nav-toggle{display:flex}\n\n      /* Hero: Foto als Vollbild-Hintergrund, Text obendrüber */\n      .home-hero{grid-template-columns:1fr;min-he einung.html\">Zweitmeinung<\u002Fa><\u002Fli>\n        <li><a href=\"skoliose/erwachsenenskoliose.html\">Erwachsenenskoliose<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fli>\n    <li>\n      <a href=\"#\">Wirbelsäulenchirurgie<\u002Fa>\n      <ul class=\"nav-submenu\">\n        <li><a href=\"wirbelsaeulenchirurgie/bandscheibenvorfall.html\">Bandscheibenvorfall<\u002Fa><\u002Fli>\n        <li><a href=\"wirbelsaeulenchirurgie/spinalkanalstenose.html\">Spinalkanalstenose<\u002Fa><\u002Fli>\n        <li><a href=\"wirbelsaeulenchirurgie/minimalinvasiv.html\">Minimalinvasiv<\u002Fa><\u002Fli>\n        <li><a href=\"wirbelsaeulenchirurgie/dynamische-stabilisation.html\">Dynamische Stabilisation (PEEK)<\u002Fa><\u002Fli>\n        <li><a href=\"wirbelsaeulenchirurgie/revision.html\">Revision<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fli>\n    <li>\n      <a href=\"#\">Konservativ<\u002Fa>\n      <ul class=\"nav-submenu\">\n        <li><a href=\"konservativ/prp-acp.html\">PRP &amp; ACP<\u002Fa><\u002Fli>\n        <li><a href=\"konservativ/prt-facettengelenksinfiltration.html\">PRT &amp; Facetteninfiltration<\u002Fa><\u002Fli>\n        <li><a href=\"konservativ/stosswellentherapie.html\">Stoßwellentherapie<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fli>\n    <li><a href=\"praxis/ueber-dr-mosafer.html\">Über<\u002Fa><\u002Fli>\n    <li><a href=\"patienten/international.html\">International<\u002Fa><\u002Fli>\n    <li><a href=\"#termin\" class=\"nav-cta\">Termin<\u002Fa><\u002Fli>\n  <\u002Ful>\n<\u002Fnav>\n\n<!-- Hero -->\n<section class=\"home-hero\">\n  <div class=\"hero-content\">\n    <p class=\"hero-eyebrow\">Dr. Mostafa Mosafer · Rosenheim &amp; Klinikum Traunstein<\u002Fp>\n    <h1>Wirbelsäule<br>und Skoliose –<br><em>namentliche<br>Expertise.<\u002Fem><\u002Fh1>\n    <p class=\"hero-sub\">Spezialisierte Praxis für Skoliose, komplexe Wirbelsäulenchirurgie und Revisionseingriffe. Persönliche Betreuung vom Erstgespräch bis zur Langzeit-Nachsorge.<\u002Fp>\n    <div class=\"hero-actions\">\n      <a href=\"#termin\" class=\"btn-primary\">Termin vereinbaren<\u002Fa>\n      <a href=\"skoliose/zweitmeinung.html\" class=\"btn-ghost\">Zweitmeinung anfragen →<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"hero-credentials\">\n      <div class=\"cred-item\">\n        <span class=\"cred-label\">Schwerpunkt<\u002Fspan>\n        <span class=\"cred-value\">Skoliose &amp; Wirbelsäulendeformitäten<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"cred-item\">\n        <span class=\"cred-label\">Ab Juli 2026<\u002Fspan>\n        <span class=\"cred-value\">Chefarzt Klinikum Traunstein<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"hero-photo\">\n    <img src=\"d14b9e85-f239-4540-a5aa-48f89606b835\" alt=\"Dr. Mostafa Mosafer – Wirbelsäulenchirurg\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Behandlungsschwerpunkte -->\n<section class=\"section schwerpunkte\">\n  <div class=\"section-inner\">\n    <p class=\"section-label\">Behandlungsschwerpunkte<\u002Fp>\n    <h2 class=\"section-title\">Strukturiert nach<br>Ihrem Anliegen.<\u002Fh2>\n    <p class=\"section-intro\">Drei klinische Schwerpunkte, eine durchgehende Betreuung. Jeder Weg führt zu ausführlichen Fachseiten mit realistischen Einordnungen.<\u002Fp>\n    <div class=\"schwerpunkte-grid\">\n      <div class=\"schwerpunkt-card\">\n        <p class=\"schwerpunkt-num\">01 · Skoliose<\u002Fp>\n        <h3>Skoliose &amp; Wirbelsäulen­deformitäten<\u002Fh3>\n        <p>Von der Erstdiagnose über Schroth und Korsett bis zur operativen Korrektur – für Jugendliche, Erwachsene und Kinder mit wachstumslenkenden Systemen.<\u002Fp>\n        <ul class=\"schwerpunkt-links\">\n          <li><a href=\"skoliose/erstdiagnose.html\">Erstdiagnose &amp; Cobb-Winkel<\u002Fa><\u002Fli>\n          <li><a href=\"skoliose/korsett-therapie.html\">Korsett-Therapie<\u002Fa><\u002Fli>\n          <li><a href=\"skoliose/magec-rods.html\">MAGEC &amp; NEMOST<\u002Fa><\u002Fli>\n          <li><a href=\"skoliose/zweitmeinung.html\">Zweitmeinung<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"schwerpunkt-card\">\n        <p class=\"schwerpunkt-num\">02 · Chirurgie<\u002Fp>\n        <h3>Wirbelsäulen­chirurgie<\u002Fh3>\n        <p>Bandscheibenvorfall, Spinalkanalstenose, minimalinvasive Fusion (TLIF/XLIF/OLIF), PEEK-Stab und spezialisierte Revisionseingriffe – konservativ, wenn möglich; operativ, wenn nötig.<\u002Fp>\n        <ul class=\"schwerpunkt-links\">\n          <li><a href=\"wirbelsaeulenchirurgie/bandscheibenvorfall.html\">Bandscheibenvorfall<\u002Fa><\u002Fli>\n          <li><a href=\"wirbelsaeulenchirurgie/spinalkanalstenose.html\">Spinalkanalstenose<\u002Fa><\u002Fli>\n          <li><a href=\"wirbelsaeulenchirurgie/minimalinvasiv.html\">Minimalinvasive Technik<\u002Fa><\u002Fli>\n          <li><a href=\"wirbelsaeulenchirurgie/dynamische-stabilisation.html\">Dynamische Stabilisation (PEEK)<\u002Fa><\u002Fli>\n          <li><a href=\"wirbelsaeulenchirurgie/revision.html\">Revisionschirurgie<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"schwerpunkt-card\">\n        <p class=\"schwerpunkt-num\">03 · Konservativ<\u002Fp>\n        <h3>Konservative &amp; biologische Therapie<\u002Fh3>\n        <p>Bildgesteuerte Injektionen (PRT, Facettengelenk), biologische Verfahren (PRP/ACP) und Stoßwellentherapie – gezielt eingesetzt bei klarer Indikation.<\u002Fp>\n        <ul class=\"schwerpunkt-links\">\n          <li><a href=\"konservativ/prt-facettengelenksinfiltration.html\">PRT &amp; Facetteninfiltration<\u002Fa><\u002Fli>\n          <li><a href=\"konservativ/prp-acp.html\">PRP &amp; ACP<\u002Fa><\u002Fli>\n          <li><a href=\"konservativ/stosswellentherapie.html\">Stoßwellentherapie<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Grundsätze (navy) -->\n<section class=\"grundsaetze\">\n  <div class=\"section-inner\">\n    <div class=\"grundsaetze-wrap\">\n      <div class=\"grundsaetze-text\">\n        <p class=\"section-label\">Arbeitsweise<\u002Fp>\n        <h2 class=\"section-title\">Drei Grundsätze,<br>die unsere Arbeit prägen.<\u002Fh2>\n        <p>Die Wirbelsäule ist ein eigenes Feld. Spezialisierung ist die Voraussetzung für Qualität – gerade bei komplexen Deformitäten und Revisionen.<\u002Fp>\n        <p>Wir operieren nicht, um zu operieren. Und wir operieren dann, wenn es nachweislich das beste langfristige Ergebnis bringt – mit modernen, evidenzbasierten Verfahren.<\u002Fp>\n        <br>\n        <a href=\"praxis/ueber-dr-mosafer.html\">Mehr über Dr. Mosafer →<\u002Fa>\n      <\u002Fdiv>\n      <ul class=\"grundsaetze-list\">\n        <li class=\"grundsatz-item\">\n          <span class=\"grundsatz-num\">01<\u002Fspan>\n          <div class=\"grundsatz-body\">\n            <h4>Konservativ zuerst<\u002Fh4>\n            <p>Operation erst, wenn strukturierte Alternativen ausgeschöpft sind.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li class=\"grundsatz-item\">\n          <span class=\"grundsatz-num\">02<\u002Fspan>\n          <div class=\"grundsatz-body\">\n            <h4>Ehrliche Aufklärung<\u002Fh4>\n            <p>Klare Darstellung von Alternativen, Grenzen und realistischen Ergebnissen.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li class=\"grundsatz-item\">\n          <span class=\"grundsatz-num\">03<\u002Fspan>\n          <div class=\"grundsatz-body\">\n            <h4>Persönliche Führung<\u002Fh4>\n            <p>Durchgehende Betreuung durch Dr. Mosafer, nicht durch wechselnde Teams.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li class=\"grundsatz-item\">\n          <span class=\"grundsatz-num\">04<\u002Fspan>\n          <div class=\"grundsatz-body\">\n            <h4>Lange Nachsorge<\u002Fh4>\n            <p>Systematisch über mindestens 12 Monate; bei Kindern über viele Jahre.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Situationen -->\n<section class=\"section situationen\">\n  <div class=\"section-inner\">\n    <p class=\"section-label\">Für spezifische Situationen<\u002Fp>\n    <h2 class=\"section-title\">Zielgerichtete<br>Einstiegspunkte.<\u002Fh2>\n    <p class=\"section-intro\">Manche Anliegen sind kein klassischer Fachbereich, sondern eine konkrete Situation. Dafür gibt es eigene, detaillierte Seiten.<\u002Fp>\n    <div class=\"situationen-grid\">\n      <a href=\"skoliose/zweitmeinung.html\" class=\"situation-card\">\n        <span class=\"situation-tag\">Zweitmeinung<\u002Fspan>\n        <h4>Ich habe eine OP-Empfehlung bekommen.<\u002Fh4>\n        <span class=\"situation-context\">Strukturierte unabhängige Einschätzung<\u002Fspan>\n        <p>Strukturierte unabhängige Zweitmeinung zu einer vorgeschlagenen Wirbelsäulen- oder Skoliose-OP – mit den 24 Fragen, die wirklich zählen.<\u002Fp>\n        <span class=\"situation-link\">→ Zur Zweitmeinung<\u002Fspan>\n      <\u002Fa>\n      <a href=\"patienten/international.html\" class=\"situation-card\">\n        <span class=\"situation-tag\">International<\u002Fspan>\n        <h4>I am travelling to Germany for care.<\u002Fh4>\n        <span class=\"situation-context\">English · عربي · فارسی<\u002Fspan>\n        <p>Strukturierte, mehrsprachige Begleitung für internationale Patienten – Vorab-Begutachtung, Video-Zweitmeinung und langfristige Video-Nachsorge.<\u002Fp>\n        <span class=\"situation-link\">→ International patients<\u002Fspan>\n      <\u002Fa>\n      <a href=\"patienten/privatpatienten.html\" class=\"situation-card\">\n        <span class=\"situation-tag\">Privat &amp; Selbstzahler<\u002Fspan>\n        <h4>Informationen für Privatpatienten.<\u002Fh4>\n        <span class=\"situation-context\">GOÄ · PKV · Beihilfe<\u002Fspan>\n        <p>GOÄ-Abrechnung, Kostenvoranschläge, Wahlarztleistungen, Koordination mit PKV und Beihilfe – transparent und ohne Marketing-Pathos.<\u002Fp>\n        <span class=\"situation-link\">→ Privatpatienten-Infos<\u002Fspan>\n      <\u002Fa>\n      <a href=\"praxis/nachsorge.html\" class=\"situation-card\">\n        <span class=\"situation-tag\">Nachsorge<\u002Fspan>\n        <h4>Nach einer Wirbelsäulen-OP.<\u002Fh4>\n        <span class=\"situation-context\">Auch bei OP andernorts<\u002Fspan>\n        <p>Strukturierter Nachsorgeplan, Reha-Empfehlungen, Narbenpflege, Sport-Wiederaufnahme – auch wenn die OP andernorts stattgefunden hat.<\u002Fp>\n        <span class=\"situation-link\">→ Nachsorge-Plan<\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Timeline -->\n<div class=\"timeline-banner\">\n  <div class=\"timeline-inner\">\n    <p class=\"timeline-eyebrow\">Juli 2026 · Neuer Standort<\u002Fp>\n    <p>Bis Juli 2026 erreichen Sie Dr. Mosafer über die Schön Klinik Vogtareuth. Ab Juli 2026 startet die eigene Praxis Mosafer Spine in Rosenheim, kombiniert mit der Chefarzttätigkeit am Klinikum Traunstein. Bestehende Patienten werden durchgehend weiterbetreut.<\u002Fp>\n    <div class=\"timeline-track\">\n      <div class=\"timeline-node active\">\n        <div class=\"timeline-dot\"><\u002Fdiv>\n        <p class=\"timeline-date\">Aktuell · bis Juli 2026<\u002Fp>\n        <p class=\"timeline-place\">Schön Klinik Vogtareuth<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"timeline-node active\">\n        <div class=\"timeline-dot\"><\u002Fdiv>\n        <p class=\"timeline-date\">Ab Juli 2026<\u002Fp>\n        <p class=\"timeline-place\">Mosafer Spine<br>Skoliosezentrum Rosenheim<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"timeline-node active\">\n        <div class=\"timeline-dot\"><\u002Fdiv>\n        <p class=\"timeline-date\">Ab Juli 2026<\u002Fp>\n        <p class=\"timeline-place\">Chefarzt Klinikum Traunstein<br>Kinderorthopädie &amp; Skoliose<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Technik -->\n<section class=\"section technik\">\n  <div class=\"section-inner\">\n    <p class=\"section-label\">Technik &amp; Standards<\u002Fp>\n    <h2 class=\"section-title\">Modern, wo Technik hilft.<br>Zurückhaltend, wo sie nur Marketing ist.<\u002Fh2>\n    <p class=\"section-intro\">Eingesetzt dort, wo Technologie das Ergebnis für die Patientin oder den Patienten nachweislich verbessert.<\u002Fp>\n    <div class=\"technik-grid\">\n      <div class=\"technik-item\">\n        <p class=\"technik-num\">01<\u002Fp>\n        <h4>Intraoperative 3D-Navigation<\u002Fh4>\n        <p>Millimetergenaue Schrauben- und Implantatplatzierung – besonders wichtig bei Deformitäten und Revisionseingriffen.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"technik-item\">\n        <p class=\"technik-num\">02<\u002Fp>\n        <h4>Neuromonitoring<\u002Fh4>\n        <p>Kontinuierliche Überwachung der Nervenfunktion während aller komplexen Eingriffe an der Wirbelsäule.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"technik-item\">\n        <p class=\"technik-num\">03<\u002Fp>\n        <h4>Minimalinvasive Verfahren<\u002Fh4>\n        <p>TLIF, XLIF, OLIF und endoskopische Techniken, wo sie medizinisch überlegen sind – nicht reflexhaft.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"technik-item\">\n        <p class=\"technik-num\">04<\u002Fp>\n        <h4>Wachstumslenkende Systeme<\u002Fh4>\n        <p>Erfahrung mit MAGEC und NEMOST bei Early-Onset-Skoliose – Indikationsstellung und Langzeitführung.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"technik-item\">\n        <p class=\"technik-num\">05<\u002Fp>\n        <h4>Bildgesteuerte Injektionen<\u002Fh4>\n        <p>PRT, Facettengelenk und epidurale Injektionen unter Fluoroskopie oder CT – keine „blinden\" Spritzen.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"technik-item\">\n        <p class=\"technik-num\">06<\u002Fp>\n        <h4>Strukturierte Nachsorge<\u002Fh4>\n        <p>Systematische klinisch-radiologische Kontrollen über 12 Monate und darüber hinaus, für inländische wie internationale Patienten.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Zweitmeinung CTA -->\n<section class=\"zweitmeinung-cta\">\n  <div class=\"zweitmeinung-inner\">\n    <div>\n      <h2>Strukturierte Zweitmeinung<br>bei OP-Empfehlung.<\u002Fh2>\n      <p>Wenn Ihnen eine Wirbelsäulen- oder Skoliose-Operation empfohlen wurde, prüfen wir die Indikation strukturiert mit den 24 Fragen, die in dieser Situation wirklich zählen – unabhängig, ohne Marketing, mit klarer Einordnung der Alternativen.<\u002Fp>\n      <a href=\"skoliose/zweitmeinung.html\" class=\"btn-gold\">Zur Zweitmeinung<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"zweitmeinung-aside\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Final CTA -->\n<section id=\"termin\" class=\"final-cta\">\n  <div class=\"final-cta-inner\">\n    <h2>Termin oder Zweitmeinung –<br>direkt an Dr. Mosafer.<\u002Fh2>\n    <p>Für Erstgespräche, Zweitmeinungen und Verlaufskontrollen. Unterlagen können vorab digital eingereicht werden.<\u002Fp>\n    <a href=\"https://www.doctolib.de\" target=\"_blank\" class=\"btn-navy\">Jetzt Termin vereinbaren →<\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- Footer -->\n<footer>\n  <p>© 2026 Mosafer Spine · Dr. Mostafa Mosafer<\u002Fp>\n  <ul class=\"footer-links\">\n    <li><a href=\"en/home.html\">English · International patients<\u002Fa><\u002Fli>\n    <li><a href=\"#\">Datenschutz<\u002Fa><\u002Fli>\n    <li><a href=\"#\">Impressum<\u002Fa><\u002Fli>\n  <\u002Ful>\n<\u002Ffooter>\n\n\n\n<\u002Fbody><\u002Fhtml>"
